<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Orbit AI{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f3f4f6;
      --muted: #9ca3af;
      --line: rgba(255, 255, 255, 0.1);
      --surface: #171f32;
      --surface-glass: rgba(23, 31, 50, 0.7);
      --canvas: #090e17;
      --brand: #8b5cf6;
      --brand-hover: #7c3aed;
      --brand-gradient: linear-gradient(135deg, #a855f7, #6366f1);
      --soft: rgba(139, 92, 246, 0.15);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.15);
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--canvas);
      background-image: radial-gradient(circle at 15% 50%, rgba(168, 85, 247, 0.12), transparent 40%),
                        radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.12), transparent 40%);
      background-attachment: fixed;
      font: 15px/1.6 'Outfit', system-ui, -apple-system, sans-serif;
    }
    a { color: inherit; text-decoration: none; transition: 0.2s; }
    
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--surface-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      max-width: 1200px;
      min-height: 72px;
      margin: auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 12px; display: grid; place-items: center;
      color: #fff; background: var(--brand-gradient); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
    }
    .account { display: flex; align-items: center; gap: 16px; color: var(--muted); font-size: 14px; font-weight: 500; }
    .avatar { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 50%; color: #fff; background: var(--brand-gradient); font-weight: 700; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.25); }
    
    .page { max-width: 1200px; margin: 0 auto; padding: 40px 28px 80px; }
    .eyebrow { margin: 0 0 8px; color: var(--brand); font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .page-title { margin: 0; font-size: 36px; font-weight: 700; line-height: 1.2; letter-spacing: -1px; }
    .lead, .muted { color: var(--muted); }
    .lead { margin: 10px 0 0; font-size: 16px; }
    .toolbar { display: flex; justify-content: space-between; align-items: end; gap: 20px; margin-bottom: 32px; }
    
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 32px; align-items: start; }
    .card { background: var(--surface-glass); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--glass-shadow); }
    .card-pad { padding: 30px; }
    .section-title { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .section-copy { margin: 6px 0 24px; color: var(--muted); font-size: 14px; }
    
    .button, button {
      display: inline-flex; justify-content: center; align-items: center; gap: 8px;
      min-height: 44px; padding: 0 20px; border: 0; border-radius: 12px;
      background: var(--brand-gradient); color: #fff; font: inherit; font-weight: 600;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
    }
    .button:hover, button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4); }
    .button.secondary, button.secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--ink); box-shadow: none; }
    .button.secondary:hover, button.secondary:hover { background: rgba(255, 255, 255, 0.1); }
    .button.small, button.small { min-height: 36px; padding: 0 16px; font-size: 13px; border-radius: 10px; }
    
    label { display: block; margin: 0 0 8px; font-size: 14px; font-weight: 500; color: #d1d5db; }
    input, textarea, select {
      width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px; outline: none; background: rgba(0, 0, 0, 0.2); color: #fff;
      font: inherit; transition: all 0.2s;
    }
    textarea { resize: vertical; min-height: 100px; }
    input:focus, textarea:focus, select:focus { border-color: var(--brand); background: rgba(0, 0, 0, 0.3); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
    form p { margin: 0 0 20px; }
    .helptext { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; }
    ul.errorlist { margin: 6px 0; padding: 0; list-style: none; color: #ef4444; font-size: 13px; font-weight: 500; }
    
    .notice { max-width: 1200px; margin: 24px auto -16px; padding: 14px 20px; border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; color: #34d399; background: var(--success-bg); font-weight: 500; }
    
    .project-list { display: grid; gap: 16px; }
    .project-card {
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding: 24px; transition: all 0.3s ease; border-radius: 16px;
      background: var(--surface-glass); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
    }
    .project-card:hover { border-color: rgba(168, 85, 247, 0.5); transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(139, 92, 246, 0.1); }
    .project-card h3 { margin: 0 0 6px; font-size: 18px; font-weight: 600; }
    .project-card p { margin: 0; color: var(--muted); font-size: 15px; }
    .project-icon { flex: 0 0 48px; width: 48px; height: 48px; display: grid; place-items: center; border-radius: 14px; color: #fff; background: var(--brand-gradient); font-size: 20px; }
    .project-info { flex: 1; }
    
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; font-weight: 500; margin-bottom: 24px; }
    .back-link:hover { color: var(--ink); }
    
    .detail-hero { padding: 40px; background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.15), transparent 60%); border-bottom: 1px solid var(--line); }
    .detail-hero .page-title { font-size: 38px; }
    .inline-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
    
    .stack { display: grid; gap: 16px; }
    .prompt-card { padding: 20px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); transition: background 0.2s; }
    .prompt-card:hover { background: rgba(255, 255, 255, 0.05); }
    .prompt-card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 600; color: #e5e7eb; }
    .prompt-card p { margin: 0; color: var(--muted); white-space: pre-wrap; font-size: 14px; }
    
    .file-list { display: grid; gap: 10px; margin-top: 16px; }
    .file-item { padding: 12px 16px; border-radius: 10px; color: #d8b4fe; background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .file-item::before { content: '📄'; }
    
    /* Chat Interface Updates */
    .chat-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: calc(100vh - 73px); overflow: hidden; background: var(--canvas); }
    .chat-sidebar { padding: 24px 20px; border-right: 1px solid var(--line); background: var(--surface-glass); backdrop-filter: blur(10px); }
    .chat-sidebar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .chat-sidebar h2 { margin: 0; font-size: 15px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .conversation-link { display: block; padding: 12px 16px; margin: 4px 0; border-radius: 10px; color: #d1d5db; font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: 0.2s; border: 1px solid transparent; }
    .conversation-link:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); color: #fff; }
    
    .chat-main { display: flex; flex-direction: column; min-width: 0; background: transparent; }
    .chat-heading { padding: 24px 32px; border-bottom: 1px solid var(--line); background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(5px); }
    .chat-heading h1 { margin: 0; font-size: 20px; font-weight: 600; }
    .chat-heading p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    
    .messages { flex: 1; min-height: 460px; max-height: calc(100vh - 220px); overflow-y: auto; padding: 32px; background: transparent; }
    .message { max-width: 80%; padding: 18px 24px; margin: 0 0 24px; border-radius: 18px; white-space: pre-wrap; font-size: 15px; line-height: 1.6; box-shadow: 0 4px 15px rgba(0,0,0,0.1); animation: fadeUp 0.3s ease forwards; opacity: 0; transform: translateY(10px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .message strong { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; }
    .message.user { margin-left: auto; color: #fff; background: var(--brand-gradient); border-bottom-right-radius: 4px; box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2); }
    .message.assistant { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-bottom-left-radius: 4px; }
    
    .empty-chat { display: grid; place-items: center; min-height: 360px; text-align: center; color: var(--muted); font-size: 16px; }
    
    .composer { display: flex; gap: 12px; padding: 20px 32px; border-top: 1px solid var(--line); background: var(--surface-glass); backdrop-filter: blur(10px); }
    .composer textarea { min-height: 52px; height: 52px; padding: 14px 18px; border-radius: 26px; resize: none; background: rgba(0, 0, 0, 0.4); }
    .composer textarea:focus { border-radius: 16px; min-height: 100px; }
    .composer button { flex: 0 0 auto; border-radius: 50%; width: 52px; height: 52px; padding: 0; display: grid; place-items: center; }
    
    .typing { display: flex; align-items: center; gap: 6px; min-height: 46px; }
    .typing i { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; animation: blink 1.4s infinite both; }
    .typing i:nth-child(1) { animation-delay: 0s; }
    .typing i:nth-child(2) { animation-delay: 0.2s; }
    .typing i:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }
    
    .auth-wrap { min-height: calc(100vh - 73px); display: grid; place-items: center; padding: 40px 24px; background: radial-gradient(circle at center, rgba(168, 85, 247, 0.1), transparent 50%); }
    .auth-card { width: min(100%, 460px); padding: 40px; background: var(--surface-glass); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; box-shadow: var(--glass-shadow), 0 0 40px rgba(139, 92, 246, 0.1); }
    .auth-logo { margin-bottom: 32px; display: inline-flex; justify-content: center; width: 100%; }
    .auth-card h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -1px; text-align: center; }
    .auth-card .lead { margin-bottom: 32px; text-align: center; font-size: 16px; }
    .auth-footer { margin: 32px 0 0; color: var(--muted); font-size: 14px; text-align: center; }
    .auth-footer a { color: #d8b4fe; font-weight: 600; text-decoration: none; transition: 0.2s; }
    .auth-footer a:hover { color: #fff; text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
    
    @media(max-width: 760px) {
      .nav, .page { padding-left: 20px; padding-right: 20px; }
      .account > span { display: none; }
      .layout { grid-template-columns: 1fr; }
      .toolbar { align-items: start; flex-direction: column; }
      .project-card { align-items: flex-start; flex-direction: column; gap: 16px; }
      .chat-shell { grid-template-columns: 1fr; }
      .chat-sidebar { display: none; }
      .messages { padding: 24px 20px; }
      .message { max-width: 90%; }
      .composer { padding: 16px; }
      .detail-hero { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="{% url 'dashboard' %}"><span class="brand-mark">✦</span><span>Orbit AI</span></a>
      {% if user.is_authenticated %}
      <div class="account">
        <span>{{ user.email }}</span>
        <span class="avatar">{{ user.email|first|upper }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="secondary small">Log out</button>
        </form>
      </div>
      {% endif %}
    </nav>
  </header>
  {% for message in messages %}<div class="notice">{{ message }}</div>{% endfor %}
  {% block content %}{% endblock %}
</body>
</html>
